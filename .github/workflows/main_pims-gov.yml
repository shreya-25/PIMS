# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - pims-gov

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # -------------------------
      # Build backend dependencies (optional but good validation)
      # -------------------------
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      # -------------------------
      # Build frontend
      # -------------------------
      - name: Install frontend dependencies + build
        run: |
          cd frontend
          npm ci
          npm run build

      # -------------------------
      # Prepare deployment package
      # -------------------------
      - name: Prepare deployment package
        run: |
          mkdir -p deploy

          # copy backend (exclude node_modules and .env)
          rsync -av backend/ deploy/backend/ --exclude node_modules --exclude .env

          # copy built frontend
          mkdir -p deploy/frontend
          rsync -av frontend/build/ deploy/frontend/build/

          # copy root files needed to start server
          cp package.json deploy/
          cp server.js deploy/

          # copy web.config if you use Windows App Service (safe to include even if Linux)
          if [ -f web.config ]; then cp web.config deploy/; fi

          # sanity check
          echo "=== DEPLOY CONTENTS ==="
          ls -la deploy
          echo "=== BACKEND ==="
          ls -la deploy/backend | head -n 50
          echo "=== FRONTEND BUILD ==="
          ls -la deploy/frontend/build | head -n 50

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: artifact

      - name: Show artifact structure
        run: |
          echo "=== ARTIFACT ROOT ==="
          ls -la artifact
          echo "=== ARTIFACT TREE (top levels) ==="
          find artifact -maxdepth 3 -type f | head -n 200

      - name: Deploy to Azure Web App (ZIP Deploy)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pims-gov'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_22CCF65905474EB78EC47107035DC9A7 }}
          package: artifact