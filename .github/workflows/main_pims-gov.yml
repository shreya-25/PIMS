name: Build and deploy Node.js app to Azure Web App - pims-gov

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------- BACKEND: validate installs (optional) ----------
      - name: Backend install (CI validation)
        working-directory: backend
        run: npm ci

      # ---------- FRONTEND ----------
      - name: Frontend install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ---------- PACKAGE ----------
      - name: Prepare deploy folder (no node_modules copied)
        run: |
          rm -rf deploy
          mkdir -p deploy/backend deploy/frontend/build

          # copy backend source (exclude node_modules and .env)
          rsync -av backend/ deploy/backend/ --exclude node_modules --exclude .env

          # copy built frontend
          rsync -av frontend/build/ deploy/frontend/build/

          # copy root startup files
          cp package.json deploy/
          cp server.js deploy/
          if [ -f web.config ]; then cp web.config deploy/; fi

      # ✅ THIS is what your normal-cloud workflow did, and your gov one is missing:
      - name: Install production dependencies in deploy/backend
        working-directory: deploy/backend
        run: |
          npm ci --omit=dev
          # (optional) shrink a bit more:
          npm cache clean --force || true

      # zip is more reliable than folder deploy
      - name: Zip artifact
        run: |
          cd deploy
          zip -r ../app.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "pims-gov"
          slot-name: "Production"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_22CCF65905474EB78EC47107035DC9A7 }}
          package: app.zip